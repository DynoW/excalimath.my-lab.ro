    <!-- Apply saved theme before React renders to prevent white flash -->
    <script>
      try {
        function setTheme(theme) {
          if (theme === "dark") {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
        }

        function getTheme() {
          const theme = window.localStorage.getItem("excalimath-theme");

          if (theme && theme === "system") {
            return window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          } else {
            return theme || "light";
          }
        }

        setTheme(getTheme());
      } catch (e) {
        console.error("Error setting theme", e);
      }
    </script>

    <div id="root"></div>
    <script>
      try {
        const canonical = document.querySelector('link[rel="canonical"]');
        const ogUrl = document.querySelector('meta[property="og:url"]');
        const currentUrl = window.location.href.split("?").shift().split("#").shift();

        if (canonical) canonical.setAttribute("href", currentUrl);
        if (ogUrl) ogUrl.setAttribute("content", currentUrl);
      } catch (error) {
        console.error("Error setting canonical URL", error);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
