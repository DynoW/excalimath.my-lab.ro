name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Get package diff
        id: diff
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          BASE_JSON=$(git show "$BASE_SHA:package.json")
          HEAD_JSON=$(cat package.json)
          DIFF=$(node -e "
            const base = JSON.parse(process.argv[1]);
            const head = JSON.parse(process.argv[2]);
            const deps = {...base.dependencies, ...base.devDependencies};
            const newDeps = {...head.dependencies, ...head.devDependencies};
            let hasOnlyPatch = true;
            for (const [k, v] of Object.entries(newDeps)) {
              const oldVer = deps[k];
              if (!oldVer || oldVer === v) continue;
              const oldClean = oldVer.replace(/^[\^~>=<]/, '');
              const newClean = v.replace(/^[\^~>=<]/, '');
              const [omaj, omin] = oldClean.split('.').map(Number);
              const [nmaj, nmin] = newClean.split('.').map(Number);
              if (nmaj > omaj) { hasOnlyPatch = false; break; }
              if (nmin > omin) { hasOnlyPatch = false; break; }
            }
            process.stdout.write(hasOnlyPatch ? 'true' : 'false');
          " "$BASE_JSON" "$HEAD_JSON")
          echo "patch_only=$DIFF" >> "$GITHUB_OUTPUT"
      - name: Enable auto-merge (patch only)
        if: steps.diff.outputs.patch_only == 'true'
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
