name: Bump @excalimath/core

on:
  repository_dispatch:
    types: [bump-core]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install new core version
        run: npm install @excalimath/core@${{ github.event.client_payload.version }}
        timeout-minutes: 5
      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add package.json package-lock.json
          git diff --cached --quiet || git commit -m "chore: bump @excalimath/core to v${{ github.event.client_payload.version }}"
          gh auth setup-git
          git push
